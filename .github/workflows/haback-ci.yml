name: HABack CI

on:
  push:
    branches: [main, master, develop, landingPage]
    paths:
      - "HABack/**"
      - "backend/**"
      - "turbo.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/haback-ci.yml"
  pull_request:
    paths:
      - "HABack/**"
      - "backend/**"
      - "turbo.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/haback-ci.yml"

concurrency:
  group: haback-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  auth-service:
    name: auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HABack/auth-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: HABack/auth-service/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: prisma generate

      - name: Lint
        run: ruff check app tests && ruff format --check app tests

      - name: Security scan (bandit)
        run: bandit -r app -ll

      - name: Test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SECRET_KEY: ci-test-secret
          INTERNAL_API_KEY: ci-test-internal
        run: pytest tests/ -q

      - name: Build (compile)
        run: python -m compileall -q app

  exped-service:
    name: exped-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HABack/exped-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: HABack/exped-service/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: prisma generate

      - name: Generate Prisma client
        env:
          DATABASE_URL: file:./.test_geoguard.db
        run: prisma generate

      - name: Lint
        run: ruff check app tests && ruff format --check app tests

      - name: Security scan (bandit)
        run: bandit -r app -ll

      - name: Test
        env:
          DATABASE_URL: file:./.test_geoguard.db
          SECRET_KEY: ci-test-secret
          INTERNAL_API_KEY: ci-test-internal
          SESSION_VALIDATION_ENABLED: "false"
        run: pytest tests/ -q

      - name: Build (compile)
        run: python -m compileall -q app

  turbo:
    name: Turbo orchestration
    runs-on: ubuntu-latest
    needs: [auth-service, exped-service]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Run HABack CI via Turbo
        run: npm run ci:haback
