services:
  - type: web
    name: geoguard-auth
    runtime: python
    rootDir: HABack/auth-service
    buildCommand: pip install -r requirements.txt && python -m prisma generate
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 120
      - key: ENVIRONMENT
        value: production
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_TLS
        value: true
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: geoguard-exped
    runtime: python
    rootDir: HABack/exped-service
    buildCommand: pip install -r requirements.txt && python -m prisma generate && python -m prisma db push
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: AUTH_SERVICE_URL
        sync: false
      - key: SESSION_VALIDATION_ENABLED
        value: true
